<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - CodeTracker</title>
  <meta name="description" content="Sign in to CodeTracker with Google or your email to track your coding progress." />
  <link rel="icon" href="assets/images/favicon.svg" type="image/svg+xml" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/custom.css" />
</head>
<body class="dark" style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:20px;">
<script>
  document.body.className = localStorage.getItem('codetracker_theme') || 'dark';
</script>

<div id="toast-container"></div>

<!-- Top-right theme toggle -->
<button class="theme-toggle-btn btn btn-ghost btn-sm px-2.5" style="position:absolute;top:20px;right:20px;" title="Toggle Theme">☀️</button>

<!-- Back to home -->
<a href="index.html" style="position:absolute;top:20px;left:20px;display:flex;align-items:center;gap:8px;font-size:0.875rem;color:var(--text-secondary);font-weight:500;">
  ← Back to Home
</a>

<!-- Auth Card -->
<div class="glass-card auth-card" style="width:100%;max-width:440px;animation:fadeIn 0.4s ease;">

  <!-- Logo -->
  <div style="text-align:center;margin-bottom:28px;">
    <div class="logo-icon" style="width:48px;height:48px;border-radius:14px;font-size:1.4rem;margin:0 auto 12px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#6366f1,#8b5cf6);">⚡</div>
    <h1 style="font-size:1.5rem;font-weight:800;">Welcome to <span class="gradient-text">CodeTracker</span></h1>
    <p style="font-size:0.85rem;color:var(--text-muted);margin-top:4px;">Your coding portfolio, simplified.</p>
  </div>

  <!-- Tabs -->
  <div class="tabs" style="margin-bottom:24px;">
    <button class="tab-btn active" id="tab-login">Sign In</button>
    <button class="tab-btn" id="tab-register">Create Account</button>
  </div>

  <!-- Google OAuth Button -->
  <button id="btn-google" class="btn btn-google btn-full" style="margin-bottom:16px;">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>

  <div class="divider-text">or</div>

  <!-- Login Form -->
  <form id="login-form" style="display:flex;flex-direction:column;gap:16px;">
    <div class="form-group">
      <label class="form-label" for="login-email">Email Address</label>
      <input id="login-email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label" for="login-password">Password</label>
      <div style="position:relative;">
        <input id="login-password" type="password" class="form-input" placeholder="••••••••" required autocomplete="current-password" />
        <button type="button" onclick="togglePassword('login-password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">👁</button>
      </div>
    </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Sign In</button>
  </form>

  <!-- Register Form -->
  <form id="register-form" style="display:none;flex-direction:column;gap:16px;">
    <div class="form-group">
      <label class="form-label" for="reg-name">Full Name</label>
      <input id="reg-name" type="text" class="form-input" placeholder="John Doe" required autocomplete="name" />
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-email">Email Address</label>
      <input id="reg-email" type="email" class="form-input" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="form-group">
      <label class="form-label" for="reg-password">Password</label>
      <div style="position:relative;">
        <input id="reg-password" type="password" class="form-input" placeholder="Minimum 6 characters" required autocomplete="new-password" minlength="6" />
        <button type="button" onclick="togglePassword('reg-password', this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">👁</button>
      </div>
    <button type="submit" class="btn btn-primary btn-full" style="margin-top:4px;">Create Account</button>
    <p style="font-size:0.75rem;color:var(--text-muted);text-align:center;">By signing up, you agree to our Terms of Service and Privacy Policy.</p>
  </form>

</div>

<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (Auth.isLoggedIn()) {
    const user = Auth.getUser();
    window.location.href = (user && user.role === 'admin') ? 'admin.html' : 'dashboard.html';
  }

  // Show register tab if URL has ?tab=register
  if (new URLSearchParams(window.location.search).get('tab') === 'register') {
    document.getElementById('tab-register').click();
  }

  function togglePassword(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? '👁' : '🙈';
  }
</script>
</body>
</html>
